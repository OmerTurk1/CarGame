<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonsuz Yarış</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="game-container">
        <button id="pause-btn">Durdur</button>
        <div id="ui-layer">
            <div id="score-display">Skor: <span id="score">0</span></div>
            
            <div id="game-over-screen" class="hidden">
                <h2>Oyun Bitti!</h2>
                <p>Skorunuz: <span id="final-score">0</span></p>
                <button id="restart-btn">Yeniden Başla</button>
                
                <div id="leaderboard">
                    <h3>Liderlik Tablosu</h3>
                    <ul id="leaderboard-list"></ul>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="700"></canvas>
        
    </div>
    <script src="{{ url_for('static', filename='js/game_new.js') }}"></script>
</body>
</html>
